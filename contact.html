<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Chelsea Guffogg, a UX/UI Designer and Web Developer with a unique background in Outdoor Education and Adventure Tourism."
    />
    <title>Contact - Chelsea Guffogg</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link rel="stylesheet" type="text/css" href="css/style.production.css" />
    <style>
      /* Global Styles and Variables */
      :root {
        --color-light-pink: #ffcdb2;
        --color-soft-pink: #ffb4a2;
        --color-warm-pink: #e5989b;
        --color-mauve: #b5838d;
        --color-deep-purple: #6d6875;
      }

      /* General Body Reset and Base styles */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* Ensure consistent box-sizing across elements */
      }

      /* Body and Typography */
      body {
        height: 100%;
        font-family: "Raleway", sans-serif;
        line-height: 1.6;
        background-color: var(--color-deep-purple);
        color: var(--color-deep-purple);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        justify-content: space-between;
        padding-top: 0;
        padding-bottom: 0;
      }

      /* Header Section */
      .page-header {
        background-color: #faf9f6;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem;
        position: relative;
        height: 12rem;
        margin-bottom: 40px;
      }

      .page-header-img {
        padding: 1rem;
        border-radius: 50%; /* Circular header logo */
      }

      /* Navigation Menu */
      .navigation {
        display: block;
      }

      .navigation-list {
        display: flex;
        justify-content: center;
        gap: 1rem;
        list-style: none;
      }

      .navigation-list_item {
        color: var(--color-deep-purple);
        font-size: calc(1.2rem + 0.5v2w);
        margin: 0 1rem;
        text-decoration: none;
        transition:
          color 0.3s ease,
          background-color 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 8px;
      }

      .navigation-list_item:hover {
        background-color: var(--color-warm-pink);
        color: white;
      }

      /* Contact Page */

      .contact-info {
        text-align: center;
        margin-bottom: 20px;
      }

      .contact-info a {
        display: block;
        font-size: 1.2rem;
        color: var(--color-mauve);
        text-decoration: none;
        margin-bottom: 10px;
      }

      .contact-info a:hover {
        color: var(--color-warm-pink);
      }

      input,
      textarea {
        width: 100%;
        max-width: 400px;
        padding: 12px;
        border: 2px solid #886176;
        border-radius: 8px;
        font-size: 1rem;
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #886176;
        box-shadow: 0px 0px 5px rgba(136, 97, 118, 0.5);
      }

      .form-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: auto;
        padding: 20px;
      }

      form {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #faf9f6;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
        margin: 0 auto;
        position: relative;
      }

      .standard-label {
        font-size: 1rem;
        border-color: #886176;
        text-align: left;
        width: 100%;
        margin-bottom: 4px;
      }

      .form-container h3 {
        text-align: center;
        font-size: 1.5rem;
        color: var(--color-deep-purple);
        margin-bottom: 20px;
      }

      button {
        display: inline-block;
        padding: 12px 20px;
        background-color: var(--color-mauve);
        color: white;
        font-size: 1rem;
        width: 228px;
        height: auto;
        font-weight: bold;
        text-align: center;
        text-decoration: none;
        border-radius: 8px;
        transition:
          background-color 0.3s ease,
          transform 0.2s ease;
        margin-top: 20px;
        border: none;
      }

      button:hover {
        background-color: var(--color-warm-pink);
        transform: scale(1.05);
        color: white;
      }

      .button:active {
        background-color: var(--color-deep-purple);
        transform: scale(0.98);
      }

      /* Footer Styling */
      .page-footer {
        justify-content: center;
        background-color: #faf9f6;
        color: white;
        display: flex;
        align-items: center;
        position: relative;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100px;
        font-size: 1rem;
        margin-top: 40px;
        transition: transform 0.3s ease-in-out;
        position: relative;
        width: 100%;
        text-align: center;
        padding: 20px;
        flex-direction: column;
      }

      .social-media {
        display: flex;
        justify-content: center;
        gap: 30px;
      }

      .social-media a {
        display: inline-block;
        margin-bottom: 20px;
      }

      .social-media img {
        width: 40px;
        height: 40px;
        transition: transform 0.3s ease;
      }

      .social-media img:hover {
        transform: scale(1.1);
      }

      /* Responsive Design */
      @media (max-width: 480px) {
        .button {
          width: 100%;
        }

        .button,
        .carousel-button {
          padding: 15px 20px;
          font-size: 1rem;
        }

        .carousel-container {
          width: 100%;
          height: 50vh;
        }

        .carousel-item h2 {
          font-size: 1.2rem;
        }

        .carousel-item p {
          font-size: 0.9rem;
        }

        .grid_item {
          padding: 15px;
        }

        h1 {
          font-size: 1.8rem;
        }

        .menu-toggle {
          display: block;
        }

        .navigation {
          display: none;
        }

        .navigation.open {
          display: flex;
        }

        .navigation-list {
          display: none;
        }

        .navigation.active .navigation-list {
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .navigation-list_item {
          font-size: 1.2rem;
        }

        .page-footer {
          padding: 10px;
        }

        .profile {
          padding: 10px;
        }

        .wrapper {
          padding: 0 10px;
        }
      }

      @media (max-width: 768px) {
        .button,
        button {
          padding: 12px 16px;
          font-size: 1rem;
        }

        .carousel {
          flex-direction: column;
          align-items: center;
        }

        .carousel-container {
          width: 100%;
        }

        .carousel-item {
          flex: 1 1 100%;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .grid_item p,
        .carousel-item p {
          font-size: 0.9rem;
        }

        h1,
        .profile h1 {
          font-size: 2rem;
          margin-bottom: 1rem;
        }

        input,
        textarea {
          font-size: 14px;
        }

        nav {
          flex-direction: column;
          text-align: center;
        }

        .navigation {
          display: none;
          position: absolute;
          top: 60px;
          left: 0;
          right: 0;
          background-color: white;
          z-index: 1000;
          flex-direction: column;
          align-items: center;
        }

        .navigation.open {
          display: flex;
        }

        .navigation-list {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
        }

        .navigation-list_item {
          display: block;
          font-size: 1.2rem;
          width: 100%;
          text-align: center;
          padding: 0.8rem 1rem;
          margin: 0 10px;
        }

        .navigation.open {
          display: flex;
          flex-direction: column;
        }

        .page-header {
          flex-direction: column;
          align-items: center;
          padding: 1.5rem 2rem;
        }

        .page-footer {
          font-size: 0.9rem;
          height: 80px;
          padding: 10px;
        }

        .profile h1 {
          font-size: 2rem;
        }

        .profile p {
          font-size: 1rem;
        }
      }

      .navigation.active {
        display: block;
      }

      @media (max-width: 1024px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>

  <body>
    <header class="page-header">
      <img
        class="page-header-img"
        src="img/PersonalLogo.png"
        alt="Chelsea Guffogg's personal logo"
      />
      <nav class="navigation" role="navigation">
        <ul class="navigation-list">
          <li><a href="index.html" class="navigation-list_item">Home</a></li>
          <li><a href="about.html" class="navigation-list_item">About</a></li>
          <li>
            <a href="projects.html" class="navigation-list_item">Projects</a>
          </li>
          <li>
            <a href="case-studies.html" class="navigation-list_item"
              >Case Studies</a
            >
          </li>
          <li>
            <a href="contact.html" class="navigation-list_item">Contact</a>
          </li>
        </ul>
      </nav>

    <main>
      <h1>Contact Information</h1>
      <div class="contact-info">
        <a href="tel:+13367052026">Phone:(336)705-2026<br /> </a>
        <a href="mailto:cacguff@gmail.com">Email Me<br /> </a>
      </div>
      <form action="cacguff@gmail.com" method="post" class="form-container">
        <h3>Send me a message!</h3>
        <label class="standard-label" for="contact-email">E-mail: </label>
        <input type="email" id="contact-email" required />

        <label class="standard-label" for="contact-phone">Telephone: </label>
        <input type="tel" id="contact-phone" pattern="d{3}[\-]\d{3}[\-]\d{4}" />

        <label class="standard-label" for="contact-message">Message: </label>
        <textarea id="contact-message" required></textarea>
        <button type="submit" value="Send message" class="button">
          Send Message
        </button>
      </form>
      <!-- <script src="js/tota11y.min.js"></script> -->
    </main>
    <footer class="page-footer">
      <div class="social-media">
        <a

          <img src="img/LinkedIn.png" alt="LinkedIn" />
        </a>
      </div>
    </footer>
    <script src="js/menu-toggle.js"></script>
  </body>
</html>
